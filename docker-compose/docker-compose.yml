services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    restart: always
    command: ["--config=/etc/config.yaml"]
    volumes:
      - ./config/otel-collector/config.yml:/etc/config.yaml
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP http receiver
    depends_on:
      - tempo
      - prometheus
      - loki

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: always
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./config/loki/config.yml:/etc/loki/config.yaml
      - ./data/loki:/tmp/loki

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    restart: always
    command: ["-config.file=/etc/config.yaml"]
    volumes:
      - ./config/tempo/config.yml:/etc/config.yaml
      - ./data/tempo:/var/tempo

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--storage.tsdb.retention.time=30d' # 配置存储中的数据保留时间
      - '--storage.tsdb.retention.size=10GB'
      - '--web.enable-remote-write-receiver'
      - '--enable-feature=exemplar-storage'
      - '--enable-feature=native-histograms'
      - '--enable-feature=promql-experimental-functions'
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/config.yml:/etc/prometheus/prometheus.yaml
      - ./data/prometheus:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./config/grafana/grafana.ini:/etc/grafana/grafana.ini
    ports:
      - "3000:3000"
    depends_on:
      - tempo
      - prometheus
      - loki
  mysql:
    image: mysql:latest
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: root
      TZ: Asia/Shanghai
    volumes:
      - ./config/mysql:/docker-entrypoint-initdb.d
      - ./data/mysql:/var/lib/mysql
    ports:
      - "3306:3306"
  redis:
    image: redis:latest
    container_name: redis
    restart: always
    command:
      - '--requirepass root'
    ports:
      - "6379:6379"
  iconify:
    image: iconify/api:latest
    container_name: iconify
    restart: always
    ports:
      - "3001:3000"
  admin:
    image: chainxi/chainxi-admin:latest
    container_name: admin
    restart: always
    ports:
      - "8080:8080"