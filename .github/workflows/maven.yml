# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@v5

    - name: Set lowercase image tag
      run: |
        LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        echo "IMAGE_TAG=${LOWERCASE_REPO}:${{ github.sha }}" >> $GITHUB_ENV
    - name: Build and push Docker images
      uses: docker/build-push-action@v6.18.0
      with:
        context: chainxi-admin/
        push: false
        tags: ${{ env.IMAGE_TAG }}
    - name: save image
      run:
        docker save -o image.tar ${{ env.IMAGE_TAG }}
    - name: scp-action
      uses: appleboy/scp-action@v1
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_PEM_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        source: "image.tar"
        target: /opt/docker/tmp/

    - name: docker-run
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_PEM_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          sudo docker load -i /opt/docker/tmp/image.tar
          sudo docker stop dev_admin || true
          sudo docker rm dev_admin || true
          sudo docker run --name dev_admin --network docker-compose_default -dp 8080:8080  --restart=always ${{ env.IMAGE_TAG }}
